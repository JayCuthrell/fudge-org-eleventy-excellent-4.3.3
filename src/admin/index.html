<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>fudge.org Content Manager</title>
  
  <script>window.CMS_MANUAL_INIT = true;</script>
  <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js"></script>
</head>
<body>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      CMS.init({
        config: {
          // THIS line must be inside the config object!
          load_config_file: false, 
          
          backend: {
            name: 'github',
            repo: 'JayCuthrell/fudge-org-eleventy-excellent-4.3.3',
            branch: 'main'
            // No base_url or auth_endpoint needed for Sveltia!
          },
          media_folder: "src/assets/images",
          public_folder: "/assets/images",
          collections: [
            {
              name: "fudge_content", 
              label: "Fudge Factor",
              folder: "src/posts/fudge-factor",
              create: true,
              slug: "{{year}}-{{month}}-{{day}}-{{slug}}",
              fields: [
                { label: "Title", name: "title", widget: "string" },
                { label: "Publish Date", name: "date", widget: "datetime" },
                { label: "Description", name: "description", widget: "string" },
                { label: "Layout", name: "layout", widget: "hidden", default: "post" },
                { label: "Tags", name: "tags", widget: "list", default: ["Fudge Factor"] },
                { label: "Body", name: "body", widget: "markdown" }
              ]
            }
          ]
        }
      });
    });
  </script>
</body>
</html>
